<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aal & Danti Wedding</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #fdf8f2;
      --blush: #e8d5c4;
      --sage:  #b5bfad;
      --gold:  #c9a96e;
      --deep:  #3a2e26;
    }

    html, body { 
      height: 100%; 
      background: var(--cream); 
      overflow: hidden; 
    }

    #topbar {
      position: fixed;
      top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--blush), var(--gold), var(--sage));
      z-index: 300;
    }

    /* ── loader / splash screen ── */
    #loader {
      position: fixed; inset: 0;
      background: var(--cream);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 1.2rem;
      z-index: 200;
      font-family: 'Jost', sans-serif; font-weight: 200;
    }
    
    .monogram {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3rem, 9vw, 5.5rem);
      font-weight: 300; font-style: italic;
      letter-spacing: 0.06em; color: var(--deep);
      animation: fadeUp 1s ease both;
    }
    
    .divider {
      width: 50px; height: 1px; background: var(--gold);
      transform: scaleX(0); transform-origin: center;
      animation: expand 1.2s 0.3s ease forwards;
    }
    
    .tagline {
      font-size: 0.65rem; letter-spacing: 0.32em;
      text-transform: uppercase; color: var(--gold);
      animation: fadeUp 1s 0.4s ease both;
    }

    /* ── recipient section inside the splash screen ── */
    #recipient-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
      margin-top: 1rem;
      opacity: 0;
      animation: fadeUp 1s 0.6s ease forwards;
    }

    .to-label {
      font-family: 'Jost', sans-serif;
      font-weight: 200;
      font-size: 0.65rem;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: var(--gold);
    }
    
    /* Optimized to fit long parameter names nicely without overflow */
    .guest-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.6rem, 5.5vw, 2.6rem); 
      font-weight: 300;
      font-style: italic;
      color: var(--deep);
      letter-spacing: 0.04em;
      text-align: center;
      padding: 0 1.5rem;
      line-height: 1.35;
      word-break: break-word;
      max-width: 85vw;
    }

    .name-rule {
      width: 36px; height: 1px;
      background: rgba(201, 169, 110, 0.4);
      margin-top: 0.2rem;
    }

    .ring {
      width: 28px; height: 28px;
      border: 1.5px solid var(--blush);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 1.1s linear infinite;
      margin-top: 1.5rem;
    }

    @keyframes spin   { to { transform: rotate(360deg); } }
    @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes expand { to { transform: scaleX(1); } }
  </style>
</head>
<body>

<div id="topbar"></div>

<div id="loader">
  <div class="monogram">A &amp; D</div>
  <div class="divider"></div>
  <div class="tagline">Wedding</div>
  
  <div id="recipient-container" style="display: none;">
    <div class="to-label">To</div>
    <div class="guest-name" id="guest-name"></div>
    <div class="name-rule"></div>
  </div>

  <div class="ring"></div>
</div>

<script>
  const nameEl = document.getElementById('guest-name');
  const recipientContainer = document.getElementById('recipient-container');

  // Parse parameters safely
  function getGuestName() {
    const params = new URLSearchParams(window.location.search);
    const q = params.get('to') || params.get('name');
    if (q) return decodeURIComponent(q).trim();
    
    const parts = window.location.pathname.split('/').filter(Boolean);
    if (parts.length) {
      const last = parts[parts.length - 1];
      if (!last.includes('.')) return decodeURIComponent(last).replace(/-/g, ' ').trim();
    }
    return null;
  }

  function capitalize(str) {
    return str.replace(/\b\w/g, c => c.toUpperCase());
  }

  const name = getGuestName();

  if (name) {
    const formattedName = capitalize(name);
    nameEl.textContent = formattedName;
    document.title = `Wedding Invitation — ${formattedName}`;
    recipientContainer.style.display = 'flex';
  }

  // Handle the 5-second redirect safely
  setTimeout(() => {
    window.location.href = "https://aal-danti-wedding.my.canva.site";
  }, 5000);
</script>
</body>
</html>
