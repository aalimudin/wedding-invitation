<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aal & Danti Wedding</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #fdf8f2;
      --blush: #e8d5c4;
      --sage:  #b5bfad;
      --gold:  #c9a96e;
      --deep:  #3a2e26;
    }

    html, body { height: 100%; background: var(--cream); overflow: hidden; }

    #topbar {
      position: fixed;
      top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--blush), var(--gold), var(--sage));
      z-index: 300;
    }

    /* ── loader ── */
    #loader {
      position: fixed; inset: 0;
      background: var(--cream);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 1.4rem;
      z-index: 200;
      font-family: 'Jost', sans-serif; font-weight: 200;
      transition: opacity 0.9s ease, visibility 0.9s ease;
    }
    #loader.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    .monogram {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3rem, 9vw, 5.5rem);
      font-weight: 300; font-style: italic;
      letter-spacing: 0.06em; color: var(--deep);
      animation: fadeUp 1s ease both;
    }
    .divider {
      width: 50px; height: 1px; background: var(--gold);
      transform: scaleX(0); transform-origin: center;
      animation: expand 1.2s 0.3s ease forwards;
    }
    .tagline {
      font-size: 0.65rem; letter-spacing: 0.32em;
      text-transform: uppercase; color: var(--gold);
      animation: fadeUp 1s 0.4s ease both;
    }
    .ring {
      width: 34px; height: 34px;
      border: 1.5px solid var(--blush);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 1.1s linear infinite;
      margin-top: 0.4rem;
    }

    /* ── iframe wrapper to hide the bottom slideshow controls ── */
    .iframe-wrapper {
      position: fixed;
      inset: 3px 0 0 0;
      width: 100%;
      height: calc(100% - 3px);
      overflow: hidden; /* Clips everything extending past this zone */
    }

    /* Scale the frame down slightly past the screen bounds to hide control navigation */
    iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: calc(100% + 46px); /* Overscans the height to push the controls bar out of sight */
      border: none;
      display: block;
      opacity: 0;
      transition: opacity 0.9s ease;
    }
    iframe.visible { opacity: 1; }

    /* ── name overlay ── */
    #name-overlay {
      position: fixed;
      inset: 3px 0 0 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
      z-index: 100;
      pointer-events: none;   /* Clicks safely trace to the Canva layout underneath */
      opacity: 0;
      transition: opacity 1s ease;
    }
    #name-overlay.show { opacity: 1; }
    #name-overlay.hide { opacity: 0; }

    .to-label {
      font-family: 'Jost', sans-serif;
      font-weight: 200;
      font-size: 0.62rem;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: rgba(201, 169, 110, 0.9);
    }
    
    /* Fluid size matching rules to scale long names flawlessly */
    .guest-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.5rem, 5.5vw, 2.6rem); 
      font-weight: 300;
      font-style: italic;
      color: rgba(255, 255, 255, 0.95);
      letter-spacing: 0.04em;
      text-align: center;
      padding: 0 1.5rem;
      line-height: 1.35;
      word-break: break-word;
      max-width: 85%;
      text-shadow:
        0 2px 20px rgba(0,0,0,0.55),
        0 1px 4px  rgba(0,0,0,0.35);
    }
    .name-rule {
      width: 36px; height: 1px;
      background: rgba(201, 169, 110, 0.7);
    }

    @keyframes spin   { to { transform: rotate(360deg); } }
    @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes expand { to { transform: scaleX(1); } }
  </style>
</head>
<body>

<div id="topbar"></div>

<div id="loader">
  <div class="monogram">A &amp; D</div>
  <div class="divider"></div>
  <div class="tagline">Wedding</div>
  <div class="ring"></div>
</div>

<div id="name-overlay">
  <div class="to-label">To</div>
  <div class="guest-name" id="guest-name"></div>
  <div class="name-rule"></div>
</div>

<div class="iframe-wrapper">
  <iframe
    id="site-frame"
    loading="lazy"
    src="https://www.canva.com/design/DAHKTtQLP4w/cy0IZORZJ18fVOQg4xmPrA/view?embed"
    title="Aal & Danti Wedding"
    allowfullscreen="allowfullscreen"
    allow="fullscreen"
  ></iframe>
</div>

<script>
  const frame   = document.getElementById('site-frame');
  const loader  = document.getElementById('loader');
  const overlay = document.getElementById('name-overlay');
  const nameEl  = document.getElementById('guest-name');

  function getGuestName() {
    const params = new URLSearchParams(window.location.search);
    const q = params.get('to') || params.get('name');
    if (q) return decodeURIComponent(q).trim();
    const parts = window.location.pathname.split('/').filter(Boolean);
    if (parts.length) {
      const last = parts[parts.length - 1];
      if (!last.includes('.')) return decodeURIComponent(last).replace(/-/g, ' ').trim();
    }
    return null;
  }

  function capitalize(str) {
    return str.replace(/\b\w/g, c => c.toUpperCase());
  }

  function hideOverlay() {
    overlay.classList.remove('show');
    overlay.classList.add('hide');
  }

  const name = getGuestName();

  if (name) {
    nameEl.textContent = capitalize(name);
    document.title = `Wedding Invitation — ${capitalize(name)}`;
  }

  frame.addEventListener('load', () => {
    setTimeout(() => {
      loader.classList.add('hidden');
      frame.classList.add('visible');

      if (name) {
        setTimeout(() => overlay.classList.add('show'), 300);

        window.addEventListener('message', (e) => {
          if (e.origin.includes('canva.com')) hideOverlay();
        }, { once: true });

        window.addEventListener('click', hideOverlay, { once: true });
        window.addEventListener('scroll', hideOverlay, { once: true, passive: true });
        window.addEventListener('touchstart', hideOverlay, { once: true, passive: true });
      }
    }, 400);
  });

  setTimeout(() => {
    if (!frame.classList.contains('visible')) {
      loader.classList.add('hidden');
      frame.classList.add('visible');
      if (name) setTimeout(() => overlay.classList.add('show'), 300);
    }
  }, 6000);
</script>
</body>
</html>
